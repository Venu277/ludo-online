<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo: Dark Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main id="join-screen" class="screen active animated-bg">
    <div class="join-container glass-panel">
      <h1 class="neon-text">LUDO</h1>
      
      <div class="input-group">
        <label for="nameInput" class="sr-only">Your Name</label>
        <input type="text" id="nameInput" placeholder="Enter your name" required autocomplete="off">
      </div>
      
      <div class="input-group">
        <label for="roomInput" class="sr-only">Room Code</label>
        <input type="text" id="roomInput" placeholder="Enter room code" required autocomplete="off">
      </div>
      
      <button id="joinBtn" class="glow-btn" type="button">JOIN GAME</button>
    </div>
  </main>

  <main id="game-screen" class="screen hidden">
    <header class="game-header">
      <h2 id="roomTitle">Room: Waiting...</h2>
    </header>

    <div class="game-layout">
      <section class="board-container glass-panel">
        <canvas id="board" width="600" height="600"></canvas>
      </section>

      <aside class="side-panel">
        <div class="controls-section glass-panel">
          <h3>Players</h3>
          <div id="players" class="players-list"></div>
          
          <div class="dice-container">
            <button id="rollBtn" class="glow-btn" type="button" disabled>ROLL DICE</button>
            <div class="dice-display">
              <div id="dice" class="dice">1</div>
            </div>
          </div>
        </div>

        <div class="chat-section glass-panel">
          <h3>Chat</h3>
          <div id="messages" class="chat-messages"></div>
          
          <div id="emoji-bar" class="emoji-bar">
            <button type="button" class="emoji-btn">🎲</button>
            <button type="button" class="emoji-btn">😂</button>
            <button type="button" class="emoji-btn">😭</button>
            <button type="button" class="emoji-btn">😡</button>
            <button type="button" class="emoji-btn">🎉</button>
          </div>

          <div class="chat-inputs">
            <input type="text" id="chatInput" placeholder="Type message..." autocomplete="off">
            <button id="sendBtn" type="button">Send</button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="leaderboard-overlay" class="screen hidden">
    <div class="leaderboard-card glass-panel">
      <h2 class="neon-text">GAME OVER</h2>
      <h3 id="winnerText" style="text-align: center; color: white; margin-bottom: 20px;"></h3>
      
      <div id="leaderboard-list" class="leaderboard-list"></div>
      
      <button id="leaveRoomBtn" class="glow-btn" style="margin-top: 24px; width: 100%;">Leave Room</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
